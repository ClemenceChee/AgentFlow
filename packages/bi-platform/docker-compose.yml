services:
  bi-platform:
    build: .
    ports:
      - "${BI_PORT:-3100}:3100"
    environment:
      - BI_PORT=3100
      - BI_DB_HOST=postgres
      - BI_DB_PORT=5432
      - BI_DB_NAME=bi_platform
      - BI_DB_USER=bi_platform
      - BI_DB_PASSWORD=${BI_DB_PASSWORD}
      - BI_REDIS_HOST=redis
      - BI_REDIS_PORT=6379
      - BI_LOG_LEVEL=info
      - BI_CORS_ORIGINS=${BI_CORS_ORIGINS:-*}
      - BI_OAUTH_ISSUER=${BI_OAUTH_ISSUER:-bi-platform}
      - BI_OAUTH_AUDIENCE=${BI_OAUTH_AUDIENCE:-bi-api}
    volumes:
      - ${HOME}/.soma:/data/soma:ro
      - ${HOME}/.agentflow/traces:/data/agentflow/traces:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bi_platform
      POSTGRES_USER: bi_platform
      POSTGRES_PASSWORD: ${BI_DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bi_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
