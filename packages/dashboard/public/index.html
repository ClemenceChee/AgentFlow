<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentFlow Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e6e6e6;
            line-height: 1.6;
        }

        .header {
            background: #1a1f2e;
            padding: 1rem 2rem;
            border-bottom: 1px solid #2a2f3e;
        }

        .header h1 {
            color: #4f96ff;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .header .subtitle {
            color: #9ca3af;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .main {
            display: grid;
            grid-template-columns: 1fr 2fr;
            height: calc(100vh - 80px);
        }

        .sidebar {
            background: #1a1f2e;
            border-right: 1px solid #2a2f3e;
            padding: 1rem;
            overflow-y: auto;
        }

        .content {
            padding: 1rem;
            overflow-y: auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: #1a1f2e;
            border: 1px solid #2a2f3e;
            border-radius: 8px;
            padding: 1rem;
        }

        .stat-card h3 {
            font-size: 0.8rem;
            color: #9ca3af;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .stat-card .value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #4f96ff;
        }

        .agent-list {
            margin-bottom: 2rem;
        }

        .agent-item {
            background: #262b3d;
            border: 1px solid #363b4d;
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .agent-item:hover {
            border-color: #4f96ff;
            background: #2a2f3e;
        }

        .agent-item.active {
            border-color: #4f96ff;
            background: #2a2f3e;
        }

        .agent-name {
            font-weight: 600;
            color: #e6e6e6;
            margin-bottom: 0.25rem;
        }

        .agent-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #9ca3af;
        }

        .success-rate {
            color: #10b981;
        }

        .success-rate.low {
            color: #f59e0b;
        }

        .success-rate.critical {
            color: #ef4444;
        }

        .traces-section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #e6e6e6;
        }

        .trace-item {
            background: #1a1f2e;
            border: 1px solid #2a2f3e;
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 0.75rem;
        }

        .trace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .trace-name {
            font-weight: 600;
            color: #e6e6e6;
        }

        .trace-timestamp {
            font-size: 0.8rem;
            color: #9ca3af;
        }

        .trace-details {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
        }

        .trace-agent {
            color: #4f96ff;
        }

        .trace-trigger {
            color: #9ca3af;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.5rem;
        }

        .status-success {
            background: #10b981;
        }

        .status-failure {
            background: #ef4444;
        }

        .status-unknown {
            background: #6b7280;
        }

        .connection-status {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .connected {
            background: #065f46;
            color: #10b981;
        }

        .disconnected {
            background: #7f1d1d;
            color: #ef4444;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #9ca3af;
        }

        @media (max-width: 768px) {
            .main {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AgentFlow Dashboard</h1>
        <div class="subtitle">Real-time monitoring for AI agent executions</div>
    </div>

    <div class="connection-status disconnected" id="connectionStatus">
        Connecting...
    </div>

    <div class="main">
        <div class="sidebar">
            <h3 class="section-title">Agents</h3>
            <div class="agent-list" id="agentList">
                <div class="loading">Loading agents...</div>
            </div>
        </div>

        <div class="content">
            <div class="stats-grid" id="statsGrid">
                <div class="loading">Loading statistics...</div>
            </div>

            <div class="traces-section">
                <h3 class="section-title">Recent Executions</h3>
                <div class="traces-list" id="tracesList">
                    <div class="loading">Loading traces...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
